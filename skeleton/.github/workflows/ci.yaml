name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/frontend:latest

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/backend:latest

      - name: Update k8s image tags
        if: github.event_name != 'pull_request'
        run: |
          REPO=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|ghcr.io/YOUR_ORG/YOUR_REPO/frontend:latest|ghcr.io/${REPO}/frontend:latest|g" k8s/frontend/deployment.yaml
          sed -i "s|ghcr.io/YOUR_ORG/YOUR_REPO/backend:latest|ghcr.io/${REPO}/backend:latest|g"   k8s/backend/deployment.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend/deployment.yaml k8s/backend/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags [skip ci]"
          git push
