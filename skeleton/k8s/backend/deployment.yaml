apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/YOUR_REPO/backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_PASSWORD
              value: hello   # use a Secret in production
          readinessProbe:
            httpGet:
              path: /api/greeting
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
